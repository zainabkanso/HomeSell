<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Listings | HomeSell</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="navPlaceholder"></div>

    <main class="container py-5">
      <div class="row mb-4 align-items-center">
        <div class="col-md-6">
          <h2 class="h3 mb-0">My home listings</h2>
          <p class="text-muted mb-0">View and manage the homes you uploaded.</p>
        </div>
        <div class="col-md-6 text-md-end mt-3 mt-md-0">
          <a href="add-home.html" class="btn btn-brand">Add new home</a>
        </div>
      </div>
      <div id="messageBox"></div>

      <!-- Tabs for Published and Drafts -->
      <ul class="nav nav-tabs mb-4" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="published-tab"
            data-bs-toggle="tab"
            data-bs-target="#published-content"
            type="button"
            role="tab"
          >
            Published
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="drafts-tab"
            data-bs-toggle="tab"
            data-bs-target="#drafts-content"
            type="button"
            role="tab"
          >
            Drafts
          </button>
        </li>
      </ul>

      <!-- Tab Content -->
      <div class="tab-content">
        <!-- Published Tab -->
        <div
          class="tab-pane fade show active"
          id="published-content"
          role="tabpanel"
        >
          <div class="row" id="publishedListingsGrid"></div>
        </div>

        <!-- Drafts Tab -->
        <div class="tab-pane fade" id="drafts-content" role="tabpanel">
          <div class="row" id="draftsListingsGrid"></div>
        </div>
      </div>

      <div id="detailsModalContainer"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common-nav.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | HomeSell</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="navPlaceholder"></div>

    <main class="container py-5">
      <div class="page-header mb-4">
        <h1 class="fw-bold">Your Profile</h1>
        <p class="text-muted">
          View and update your account details, including your name, phone
          number, email, and password.
        </p>
      </div>

      <div id="messageBox"></div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <form id="profileForm">
            <div class="mb-3">
              <label for="nameInput" class="form-label">Name</label>
              <input
                id="nameInput"
                type="text"
                class="form-control"
                placeholder="Your full name"
              />
            </div>

            <div class="mb-3">
              <label for="phoneInput" class="form-label">Phone Number</label>
              <input
                id="phoneInput"
                type="tel"
                class="form-control"
                placeholder="Enter your phone number"
              />
            </div>

            <div class="mb-4">
              <label for="emailInput" class="form-label">Email</label>
              <input
                id="emailInput"
                type="email"
                class="form-control"
                placeholder="you@example.com"
                required
              />
            </div>

            <div class="mb-3">
              <label for="currentPasswordInput" class="form-label"
                >Current Password</label
              >
              <input
                id="currentPasswordInput"
                type="password"
                class="form-control"
                placeholder="Enter current password"
              />
            </div>

            <div class="mb-3">
              <label for="newPasswordInput" class="form-label"
                >New Password</label
              >
              <input
                id="newPasswordInput"
                type="password"
                class="form-control"
                placeholder="Enter new password"
              />
            </div>

            <div class="mb-4">
              <label for="confirmPasswordInput" class="form-label"
                >Confirm New Password</label
              >
              <input
                id="confirmPasswordInput"
                type="password"
                class="form-control"
                placeholder="Confirm new password"
              />
            </div>

            <div class="mb-3 text-muted">
              Leave the password fields blank if you do not want to change your
              password.
            </div>

            <button type="submit" class="btn btn-brand">Save Profile</button>
            <a href="homes.html" class="btn btn-outline-secondary ms-2"
              >Back to homes</a
            >
          </form>
        </div>
      </div>
    </main>

    <script src="js/common-nav.js"></script>
    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback | HomeSell</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="navPlaceholder"></div>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 fw-bold mb-2">Share Your Feedback</h1>
              <p class="text-muted mb-4">
                Tell us about your experience with HomeSell.
              </p>

              <div id="feedbackMessage"></div>

              <form id="feedbackForm">
                <div class="mb-3">
                  <label for="feedbackName" class="form-label">Your Name</label>
                  <input
                    id="feedbackName"
                    name="name"
                    type="text"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="feedbackEmail" class="form-label"
                    >Email (optional)</label
                  >
                  <input
                    id="feedbackEmail"
                    name="email"
                    type="email"
                    class="form-control"
                  />
                </div>

                <div class="mb-3">
                  <label for="feedbackText" class="form-label"
                    >Your Feedback</label
                  >
                  <textarea
                    id="feedbackText"
                    name="message"
                    class="form-control"
                    rows="5"
                    required
                  ></textarea>
                </div>

                <button type="submit" class="btn btn-brand w-100">
                  Submit Feedback
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common-nav.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>

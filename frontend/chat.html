<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chat | HomeSell</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/chat.css" />
  </head>

  <body>
    <a href="my-chats.html" class="chat-back-link">← Messages</a>

    <main class="chat-page">
      <div class="chat-wrapper">
        <div class="chat-header">
          <div class="chat-user">
            <div class="chat-avatar">🏠</div>

            <div>
              <h5 class="mb-0">Property Chat</h5>
              <small>Real-time conversation</small>
            </div>
          </div>
        </div>

        <div id="chatMessages" class="chat-body"></div>

        <div id="filePreviewBox" class="file-preview-box" style="display: none">
          <div id="filePreviewContent"></div>

          <div class="mt-2 d-flex gap-2 justify-content-end">
            <button
              type="button"
              class="btn btn-sm btn-outline-secondary"
              id="cancelFileBtn"
            >
              Cancel
            </button>

            <button type="button" class="btn btn-sm btn-brand" id="sendFileBtn">
              Send
            </button>
          </div>
        </div>

        <form id="chatForm" class="chat-form">
          <div class="attachment-menu-wrapper">
            <button
              type="button"
              id="attachmentBtn"
              class="btn btn-outline-secondary chat-action-btn"
            >
              📎
            </button>

            <div id="attachmentMenu" class="attachment-menu">
              <button type="button" id="takePhotoBtn">📷 Take Photo</button>

              <label>
                🖼 Choose Image
                <input type="file" id="photoInput" accept="image/*" hidden />
              </label>

              <label>
                📁 Choose Video
                <input type="file" id="videoInput" accept="video/*" hidden />
              </label>

              <button type="button" id="locationBtn">📍 Location</button>
            </div>
          </div>

          <input
            type="text"
            id="messageInput"
            class="chat-input"
            placeholder="Write your message..."
            autocomplete="off"
          />

          <button
            type="button"
            id="recordBtn"
            class="btn btn-outline-secondary chat-action-btn"
          >
            🎤
          </button>

          <button class="btn btn-brand send-btn" type="submit">Send</button>
        </form>
      </div>
    </main>

    <div id="cameraModal" class="camera-modal">
      <div class="camera-box">
        <video id="cameraPreview" autoplay playsinline></video>

        <canvas id="cameraCanvas" style="display: none"></canvas>

        <div class="camera-actions">
          <button
            type="button"
            id="closeCameraBtn"
            class="btn btn-outline-secondary"
          >
            Cancel
          </button>

          <button type="button" id="capturePhotoBtn" class="btn btn-brand">
            Capture
          </button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/common-nav.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
  </body>
</html>
